<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Linux Terminal</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        h2 { margin: 0 0 5px 0; color: #00ff00; }
        p { margin: 0 0 15px 0; color: #aaa; font-size: 14px; }
        #screen_container {
            width: 100%;
            max-width: 800px;
            height: 450px;
            background-color: #000;
            border: 3px solid #333;
            border-radius: 6px;
            padding: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        #screen_container > div {
            white-space: pre;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
            line-height: 16px;
            color: #ffffff;
        }
        canvas { display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/v86@0.33.0/build/libv86.js"></script>
</head>
<body>

    <h2>My Hosted Linux Shell</h2>
    <p>Booting a pure WebAssembly kernel directly from your repository files...</p>

    <div id="screen_container">
        <div></div>
        <canvas></canvas>
    </div>

    <script>
        window.onload = function() {
            var emulator = new V86Starter({
                wasm_path: "https://cdn.jsdelivr.net/npm/v86@0.33.0/build/v86.wasm",
                memory_size: 16 * 1024 * 1024, 
                vga_memory_size: 2 * 1024 * 1024,
                screen_container: document.getElementById("screen_container"),
                
                bios: { url: "https://cdn.jsdelivr.net/npm/v86@0.33.0/bios/seabios.bin" },
                vga_bios: { url: "https://cdn.jsdelivr.net/npm/v86@0.33.0/bios/vgabios.bin" },
                
                // Points to the OS image inside your own project directory
                bzimage: { url: "bzimage" },
                
                cmdline: "rw init=/bin/sh root=rootfs rootfstype=tmpfs console=ttyS0",
                autostart: true,
            });
        };
    </script>
</body>
</html>
