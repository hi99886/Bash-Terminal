<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real In-Browser Linux Terminal</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        h2 {
            margin: 0 0 5px 0;
            color: #00ff00;
        }
        p {
            margin: 0 0 15px 0;
            color: #aaa;
            font-size: 14px;
        }
        /* This box simulates the monitor screen */
        #screen_container {
            width: 100%;
            max-width: 800px;
            height: 450px;
            background-color: #000;
            border: 3px solid #333;
            border-radius: 6px;
            padding: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        /* Formats the raw text stream inside the VM emulator */
        #screen_container > div {
            white-space: pre;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
            line-height: 16px;
            color: #ffffff;
        }
        canvas {
            display: none; /* Hide graphical output, we only want text */
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/v86@0.33.0/build/libv86.js"></script>
</head>
<body>

    <h2>WebAssembly x86 Linux Emulator</h2>
    <p>Booting an actual Linux kernel client-side. Wait about 10 seconds for the console prompt.</p>

    <div id="screen_container">
        <div></div>
        <canvas></canvas>
    </div>

    <script>
        window.onload = function() {
            // Boot the x86 Emulator structure entirely inside the browser tab
            var emulator = new V86Starter({
                wasm_path: "https://cdn.jsdelivr.net/npm/v86@0.33.0/build/v86.wasm",
                memory_size: 32 * 1024 * 1024, // Allocates 32MB of browser RAM
                vga_memory_size: 2 * 1024 * 1024,
                screen_container: document.getElementById("screen_container"),
                
                // Fetch public open-source x86 Bios files 
                bios: { url: "https://cdn.jsdelivr.net/npm/v86@0.33.0/bios/seabios.bin" },
                vga_bios: { url: "https://cdn.jsdelivr.net/npm/v86@0.33.0/bios/vgabios.bin" },
                
                // Fetch a real, hyper-minimal Linux system image
                bzimage: { url: "https://cdn.jsdelivr.net/npm/v86-images@1.0.1/images/alpine/bzImage" },
                
                // Boot arguments to drop straight into the shell console
                cmdline: "rw root=/dev/ram0 init=/bin/sh console=ttyS0",
                autostart: true,
            });
        };
    </script>
</body>
</html>
